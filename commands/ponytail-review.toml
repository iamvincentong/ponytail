description = "Review changes for over-engineering, what can be deleted"
prompt = "Review the current code changes for over-engineering only, not correctness. One line per finding, ending with a rough line estimate when it helps (~-12, -1 dep; exact counts not required): L<line>: <tag> <what to cut>. <replacement>. Tags: delete (dead code/speculative feature), stdlib (hand-rolled logic the language/runtime stdlib ships), native (a third-party dependency added solely for what a platform feature already does; do not flag a dep already installed and reused elsewhere), yagni (abstraction with one implementation), shrink (pure restructuring, same logic fewer lines, no library swap). Precedence when more than one fits, highest wins, one tag per finding: delete > native > stdlib > yagni > shrink. Suffix a tag with ? (delete?, native?, yagni?) when you cannot prove the cut is behavior-neutral from the diff alone — the call's idempotency/dead-ness/caller count depends on code outside the diff, a swap can shift observable output (locale/timezone/format/validation) or runtime support, or the abstraction is a test seam, trust boundary, or published API; state the precondition to check before applying. A listed replacement is a direction, not validated code to paste. Never flag, and never count toward net lines, the AGENTS.md carve-outs: input validation at trust boundaries, error handling that prevents data loss, security, accessibility markup, hardware calibration, the one runnable check (assert-based self-check or one small test file), or `ponytail:` ceiling/upgrade comments — route any such cut to the normal pass. Carve-out code is never counted. End with one rough verdict: 'net: ~-N lines, -M deps possible — J ?-gated, confirm before cutting' (estimate N, drop the gated clause when none), or just 'Lean already.' if nothing to cut. This is complexity only, not a release-go; correctness, security, and performance still owe a separate pass."
